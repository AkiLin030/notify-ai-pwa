AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Reminder PWA - Full Stack Infrastructure

Parameters:
  VapidPublicKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ai-reminder/vapid-public-key
    Description: VAPID Public Key stored in SSM
  VapidPrivateKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ai-reminder/vapid-private-key
    Description: VAPID Private Key stored in SSM
  GroqApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ai-reminder/groq-api-key
    Description: Groq API Key stored in SSM

Resources:
  # ==========================================
  # Database
  # ==========================================
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AiReminderUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ==========================================
  # Notifications (Email via SNS)
  # ==========================================
  EmailNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: AiReminderEmailTopic

  # ==========================================
  # Backend API (Lambda + API Gateway)
  # ==========================================
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/
      Handler: src/api.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        ProxyApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  # ==========================================
  # Reminder Scheduler (Lambda + EventBridge)
  # ==========================================
  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/
      Handler: src/scheduler.handler
      Runtime: nodejs20.x
      Timeout: 60
      Architectures:
        - x86_64
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SNS_TOPIC_ARN: !Ref EmailNotificationTopic
          GROQ_API_KEY: !Ref GroqApiKey
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt EmailNotificationTopic.TopicName
      Events:
        HourlySchedule:
          Type: Schedule
          Properties:
            Schedule: 'rate(1 minute)'
            Name: MinutelyReminderTrigger
            Description: Triggers the reminder scheduler every minute

  # ==========================================
  # Frontend Hosting (S3 + CloudFront)
  # ==========================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ==========================================
  # Monitoring (CloudWatch Alarms)
  # ==========================================
  SchedulerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: SchedulerLambdaErrorAlarm
      AlarmDescription: "Triggers if Scheduler Lambda has errors"
      Namespace: "AWS/Lambda"
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SchedulerFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref EmailNotificationTopic

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  FrontendUrl:
    Description: "S3 Website URL"
    Value: !GetAtt FrontendBucket.WebsiteURL
